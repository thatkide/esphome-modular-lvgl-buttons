# guition-esp32-jc8048w550 5-inch IPS 800*480 Smart Screen
#
# Hardware configuration file
---

substitutions:
  # Screen Size
  screen_height: 480
  screen_width: 800

esphome:
  min_version: 2026.4.0
  project:
    name: "Guition.ESP32-jc8048w550"
    version: "1.0"

esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      execute_from_psram: true

psram:
  mode: octal
  speed: 80MHz

preferences:
  flash_write_interval: 5min

# -------------------------------------------
# Internal outputs
# -------------------------------------------
output:
  # Backlight LED
  - platform: ledc
    pin:
      number: GPIO02
    id: gpio_backlight_pwm
    frequency: 1220

light:
  - platform: monochromatic
    id: display_backlight
    output: gpio_backlight_pwm
    name: Display Backlight
    icon: mdi:lightbulb-on
    restore_mode: ALWAYS_ON

# -------------------------------------------
# Touchscreen gt911
# -------------------------------------------
i2c:
  - id: bus_a
    sda: GPIO19
    scl: GPIO20
    scan: true

touchscreen:
  - platform: gt911
    id: my_touchscreen
    i2c_id: bus_a
    address: 0x5D
    update_interval: 16ms
    # on_touch:
    #   - logger.log:
    #       format: Touch at (%d, %d)
    #       args: [touch.x, touch.y]
    #   - lambda: |-
    #       ESP_LOGI("cal", "x=%d, y=%d, x_raw=%d, y_raw=%0d",
    #           touch.x,
    #           touch.y,
    #           touch.x_raw,
    #           touch.y_raw
    #           );

# -------------------------------------------
# Display
# -------------------------------------------
display:
  - platform: rpi_dpi_rgb
    id: main_display
    color_order: RGB
    invert_colors: true
    update_interval: never
    auto_clear_enabled: false  # takes 2.8 seconds to clear the display
    dimensions:
      width: 800
      height: 480
    de_pin: GPIO40
    hsync_pin: GPIO39
    vsync_pin: GPIO41
    pclk_pin: GPIO42
    pclk_frequency: 16MHz
    data_pins:
      red:
        - 45
        - 48
        - 47
        - 21
        - 14
      green:
        - 5
        - 6
        - 7
        - 15
        - 16
        - 4
      blue:
        - 8
        - 3
        - 46
        - 9
        - 1

# Special LVGL settings required for this display
lvgl:
  rotation: ${rotation | default("0")}
