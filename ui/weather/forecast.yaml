---
# Weather forecast using direct Home Assistant action call
# No template sensor required in HA configuration.yaml!
#
# vars:
#   size: icon size (e.g., 80)
#   weather_entity: weather entity id (default: weather.home)

mapping:
  - id: weather_icon_${size}
    from: string
    to: image
    entries:
      clear-night: clear_night_${size}
      cloudy: cloudy_${size}
      exceptional: exceptional_${size}
      fog: fog_${size}
      hail: hail_${size}
      lightning: lightning_${size}
      lightning-rainy: lightning_rainy_${size}
      partlycloudy: partlycloudy_${size}
      partlycloudy-night: partlycloudy_${size}
      pouring: pouring_${size}
      rainy: rainy_${size}
      snowy: snowy_${size}
      snowy-rainy: snowy_rainy_${size}
      sunny: sunny_${size}
      windy: windy_${size}
      windy-variant: windy_${size}
      unknown: unknown_${size}
      unavailable: unknown_${size}

globals:
  - id: forecast_condition_0
    type: std::string
    initial_value: '"unknown"'
  - id: forecast_condition_1
    type: std::string
    initial_value: '"unknown"'
  - id: forecast_condition_2
    type: std::string
    initial_value: '"unknown"'
  - id: forecast_condition_3
    type: std::string
    initial_value: '"unknown"'

# Fetch weather on startup and every hour
time:
  - platform: homeassistant
    on_time:
      - hours: '*'
        minutes: 0
        seconds: 30
        then:
          - script.execute: fetch_weather_forecast

api:
  on_client_connected:
    - delay: 3s
    - script.execute: fetch_weather_forecast


script:
  - id: fetch_weather_forecast
    then:
      - logger.log:
          level: INFO
          format: "Requesting weather forecast from Home Assistant..."
      - homeassistant.action:
          action: weather.get_forecasts
          data:
            type: daily
            entity_id: ${weather_entity | default("weather.home")}
          capture_response: true
          response_template: >-
            {% set forecasts = response["${weather_entity | default('weather.home')}"].forecast %}
            {% set result = {
              'condition_0': forecasts[0].condition | default('unknown'),
              'temp_hi_0': forecasts[0].temperature | default(0) | string,
              'temp_lo_0': forecasts[0].templow | default(0) | string,
              'day_0': as_timestamp(forecasts[0].datetime) | timestamp_custom('%a'),
              'condition_1': forecasts[1].condition | default('unknown'),
              'temp_hi_1': forecasts[1].temperature | default(0) | string,
              'temp_lo_1': forecasts[1].templow | default(0) | string,
              'day_1': as_timestamp(forecasts[1].datetime) | timestamp_custom('%a'),
              'condition_2': forecasts[2].condition | default('unknown'),
              'temp_hi_2': forecasts[2].temperature | default(0) | string,
              'temp_lo_2': forecasts[2].templow | default(0) | string,
              'day_2': as_timestamp(forecasts[2].datetime) | timestamp_custom('%a'),
              'condition_3': forecasts[3].condition | default('unknown'),
              'temp_hi_3': forecasts[3].temperature | default(0) | string,
              'temp_lo_3': forecasts[3].templow | default(0) | string,
              'day_3': as_timestamp(forecasts[3].datetime) | timestamp_custom('%a')
            } %}
            {{ result | tojson }}
          on_success:
            - lambda: |-
                auto data = response["response"];

                // Store conditions in globals for icon updates
                id(forecast_condition_0) = data["condition_0"].as<std::string>();
                id(forecast_condition_1) = data["condition_1"].as<std::string>();
                id(forecast_condition_2) = data["condition_2"].as<std::string>();
                id(forecast_condition_3) = data["condition_3"].as<std::string>();

                ESP_LOGI("weather", "Day 0: %s, Hi: %s, Lo: %s",
                    data["day_0"].as<std::string>().c_str(),
                    data["temp_hi_0"].as<std::string>().c_str(),
                    data["temp_lo_0"].as<std::string>().c_str());

            # Update Day 0
            - lvgl.label.update:
                id: forecast_day_0
                text: !lambda 'return response["response"]["day_0"].as<std::string>();'
            - lvgl.label.update:
                id: forecast_temperature_hi_0
                text: !lambda 'return response["response"]["temp_hi_0"].as<std::string>() + "°";'
            - lvgl.label.update:
                id: forecast_temperature_lo_0
                text: !lambda 'return response["response"]["temp_lo_0"].as<std::string>() + "°";'
            - script.execute: update_forecast_icon_0

            # Update Day 1
            - lvgl.label.update:
                id: forecast_day_1
                text: !lambda 'return response["response"]["day_1"].as<std::string>();'
            - lvgl.label.update:
                id: forecast_temperature_hi_1
                text: !lambda 'return response["response"]["temp_hi_1"].as<std::string>() + "°";'
            - lvgl.label.update:
                id: forecast_temperature_lo_1
                text: !lambda 'return response["response"]["temp_lo_1"].as<std::string>() + "°";'
            - script.execute: update_forecast_icon_1

            # Update Day 2
            - lvgl.label.update:
                id: forecast_day_2
                text: !lambda 'return response["response"]["day_2"].as<std::string>();'
            - lvgl.label.update:
                id: forecast_temperature_hi_2
                text: !lambda 'return response["response"]["temp_hi_2"].as<std::string>() + "°";'
            - lvgl.label.update:
                id: forecast_temperature_lo_2
                text: !lambda 'return response["response"]["temp_lo_2"].as<std::string>() + "°";'
            - script.execute: update_forecast_icon_2

            # Update Day 3
            - lvgl.label.update:
                id: forecast_day_3
                text: !lambda 'return response["response"]["day_3"].as<std::string>();'
            - lvgl.label.update:
                id: forecast_temperature_hi_3
                text: !lambda 'return response["response"]["temp_hi_3"].as<std::string>() + "°";'
            - lvgl.label.update:
                id: forecast_temperature_lo_3
                text: !lambda 'return response["response"]["temp_lo_3"].as<std::string>() + "°";'
            - script.execute: update_forecast_icon_3

          on_error:
            - logger.log:
                level: ERROR
                format: "Failed to fetch weather forecast from Home Assistant"

  # Icon update scripts - these read from the globals
  - id: update_forecast_icon_0
    then:
      - lvgl.image.update:
          id: forecast_condition_icon_0
          src: !lambda 'return id(weather_icon_${size})[id(forecast_condition_0)];'

  - id: update_forecast_icon_1
    then:
      - lvgl.image.update:
          id: forecast_condition_icon_1
          src: !lambda 'return id(weather_icon_${size})[id(forecast_condition_1)];'

  - id: update_forecast_icon_2
    then:
      - lvgl.image.update:
          id: forecast_condition_icon_2
          src: !lambda 'return id(weather_icon_${size})[id(forecast_condition_2)];'

  - id: update_forecast_icon_3
    then:
      - lvgl.image.update:
          id: forecast_condition_icon_3
          src: !lambda 'return id(weather_icon_${size})[id(forecast_condition_3)];'


# Weather icons - included automatically
# https://github.com/manifestinteractive/weather-underground-icons

image:
  rgb565:
    alpha_channel:
      - file: esphome-modular-lvgl-buttons/ui/weather/assets/images/nt_clear.svg
        id: clear_night_${size}
        resize: ${size}x${size}

      - file: esphome-modular-lvgl-buttons/ui/weather/assets/images/cloudy.svg
        id: cloudy_${size}
        resize: ${size}x${size}

      - file: esphome-modular-lvgl-buttons/ui/weather/assets/images/tstorms.svg
        id: exceptional_${size}
        resize: ${size}x${size}

      - file: esphome-modular-lvgl-buttons/ui/weather/assets/images/fog.svg
        id: fog_${size}
        resize: ${size}x${size}

      - file: esphome-modular-lvgl-buttons/ui/weather/assets/images/sleet.svg
        id: hail_${size}
        resize: ${size}x${size}

      - file: esphome-modular-lvgl-buttons/ui/weather/assets/images/chancetstorms.svg
        id: lightning_${size}
        resize: ${size}x${size}

      - file: esphome-modular-lvgl-buttons/ui/weather/assets/images/tstorms.svg
        id: lightning_rainy_${size}
        resize: ${size}x${size}

      - file: esphome-modular-lvgl-buttons/ui/weather/assets/images/partlycloudy.svg
        id: partlycloudy_${size}
        resize: ${size}x${size}

      - file: esphome-modular-lvgl-buttons/ui/weather/assets/images/rain.svg
        id: pouring_${size}
        resize: ${size}x${size}

      - file: esphome-modular-lvgl-buttons/ui/weather/assets/images/chancerain.svg
        id: rainy_${size}
        resize: ${size}x${size}

      - file: esphome-modular-lvgl-buttons/ui/weather/assets/images/snow.svg
        id: snowy_${size}
        resize: ${size}x${size}

      - file: esphome-modular-lvgl-buttons/ui/weather/assets/images/chancesleet.svg
        id: snowy_rainy_${size}
        resize: ${size}x${size}

      - file: esphome-modular-lvgl-buttons/ui/weather/assets/images/sunny.svg
        id: sunny_${size}
        resize: ${size}x${size}

      - file: esphome-modular-lvgl-buttons/ui/weather/assets/images/windy.svg
        id: windy_${size}
        resize: ${size}x${size}

      - file: esphome-modular-lvgl-buttons/ui/weather/assets/images/unknown.svg
        id: unknown_${size}
        resize: ${size}x${size}

      - file: esphome-modular-lvgl-buttons/ui/weather/assets/images/circle-slash.svg
        id: unavailable_${size}
        resize: ${size}x${size}
