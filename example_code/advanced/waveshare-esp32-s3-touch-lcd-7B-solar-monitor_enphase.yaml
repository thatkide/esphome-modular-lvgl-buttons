---
# Substitution variables used through the codebase
substitutions:
  envoy_id: !secret envoy_id
  enpower_id: !secret enpower_id
  weather_id: weather.home

  icon_font: mdi_icons_40
  text_font: nunito_20
  text_color: white
  bg_color: black
  button_on_color: "ep_orange"
  button_off_color: "very_dark_gray"
  icon_on_color: "yellow"
  icon_off_color: "gray"
  label_on_color: "white"
  label_off_color: "gray"
  button_text_color: "white"

  # LCD back light modes - Code in backlight_time.yaml
  display_daytime_brightness: "100%"
  display_nighttime_brightness: "50%"
  display_night_hour: "0"      # Hour for night mode (0-23)
  display_night_minute: "0"    # Minute for night mode (0-59)
  display_backlight_timeout_always_enabled: "false"  # Set true to dim/off in all modes, not just Night
  display_backlight_timeout_initial: "5"  # Initial backlight timeout in minutes (-1 to disable)

  # Screen Size
  screen_height: 600
  screen_width: 1024

esphome:
  name: "solar-monitor"
  friendly_name: "Solar Monitor"
  comment: "Enphase solar monitor"
  on_boot:
  - priority: 400
    then:
      - script.execute: update_loading_page

logger:
#  level: info
#  logs:
#    i2c.idf: info
#    touchscreen: info
#    scheduler: none

# Time update script - This is run once per second. Use it to update any time related labels.
script:
  - id: time_update
    then:
      - lvgl.label.update:
          id: date_label
          text: !lambda |- # Need this complex lamda so we can display the date with no lading zero
            auto time = id(system_time).now();
            int day = time.day_of_month;
            char strftime_buf[64];
            snprintf(strftime_buf, sizeof(strftime_buf), "%s %d", time.strftime("%B").c_str(), day);
            return {strftime_buf};
      - lvgl.label.update:
          id: time_label
          text: !lambda 'return id(system_time).now().strftime("%l:%M");' # The format %I:%M %p will display the time in a 12-hour format with "am" or "pm" included
      - lvgl.indicator.update:
          id: minute_hand
          value: !lambda |-
            return id(system_time).now().minute;
      - lvgl.indicator.update:
          id: hour_hand
          value: !lambda |-
            auto now = id(system_time).now();
            return std::fmod(now.hour, 12) * 60 + now.minute;

packages:
  # Generic configuration for ESP32 screens
  # SDL has no Wi-Fi
  wifi: !include esphome-modular-lvgl-buttons/common/wifi.yaml
  # Enable OTA updates with a status screen
  ota_screen: !include esphome-modular-lvgl-buttons/common/ota.yaml
  # All the colors
  theme:  !include esphome-modular-lvgl-buttons/common/theme/index.yaml
  # Some nice basic fonts
  # 1000s of glyphs
  # Some basic sensors
  sensors: !include esphome-modular-lvgl-buttons/common/sensors_base.yaml
  # Styles + Themes
  # Use this theme for debugging
  # theme:  !include esphome-modular-lvgl-buttons/common/theme/index_debug.yaml  # uncomment to enable debug outlines
  # Include if your touch screen has a backlight. Also sets the time from HA
  backlight: !include esphome-modular-lvgl-buttons/common/backlight_time.yaml

  # Hardware description file
  hardware: !include
    file: esphome-modular-lvgl-buttons/hardware/waveshare-esp32-s3-touch-lcd-7B.yaml
    vars:
      rotation: "0"  # set screen rotation 0, 90, 180, 270
  # Basic boot screen with ESPHome logo and device diagnostic info
  loading_screen: !include esphome-modular-lvgl-buttons/pages/loading.yaml
  # info screen - WiFi login, IP address, MAC address etc
  info_screen: !include esphome-modular-lvgl-buttons/pages/info.yaml

  # Get solar panel info from Enphase
  solar: !include esphome-modular-lvgl-buttons/ui/solar/sensors_assets_solar.yaml
  # Get backup Battery info from Enphase
  battery: !include esphome-modular-lvgl-buttons/ui/solar/sensors_assets_battery.yaml
  # Fetch today's solar production/consumption from HA recorder
  update_solar_today: !include esphome-modular-lvgl-buttons/ui/solar/update_solar_today.yaml
  # Fetch realtime solar power data from HA
  update_solar_realtime: !include esphome-modular-lvgl-buttons/ui/solar/update_solar_realtime.yaml


# Nice little box with a boder and shadow.
.shadow_box_styles:
    - &shadow_box_obj_base
      bg_color: gray200
      scrollable: false
      radius: 20
      pad_all: 15
      shadow_color: black
      shadow_opa: 50%
      shadow_width: 20
      shadow_ofs_x: 2
      shadow_ofs_y: 2
      layout:
        type: grid
        grid_rows: [ FR(1), content]
        grid_columns: [ content, FR(1) ]
        pad_row: 10

# -------------------------------------------------------------------------
# LVGL pages and buttons
# -------------------------------------------------------------------------
lvgl:
# Main Page
  pages:
    - id: main_page
      layout: 3x3
      bg_color: White
      styles: page_style
      <<: !include
        file: esphome-modular-lvgl-buttons/common/swipe_navigation.yaml
      widgets:
# Time/date display box
        - obj:
            grid_cell_row_pos: 0
            grid_cell_column_pos: 0
            grid_cell_x_align: stretch
            grid_cell_y_align: stretch
            pad_all: 5
            widgets:
              - obj:
                  <<: *shadow_box_obj_base
                  widgets:
                    - meter:
                        grid_cell_row_pos: 0
                        grid_cell_column_pos: 0
                        height: 60
                        width: 60
                        bg_opa: TRANSP
                        border_width: 6
                        border_color: black
                        radius: 50%
                        indicator:
                          bg_color: black
                          bg_opa: COVER
                          radius: 50%
                          width: 4
                          height: 4
                          line_rounded: true
                        scales:
                          # Minutes scale with minute hand
                          - range_from: 0
                            range_to: 60
                            angle_range: 360
                            rotation: 270
                            ticks:
                              count: 13
                              length: 2
                              width: 0
                            indicators:
                              - line:
                                  id: minute_hand
                                  width: 6
                                  color: black
                                  r_mod: 6
                                  value: 0
                          # Hour hand scale (0-720 for smooth positioning between hours)
                          - range_from: 0
                            range_to: 720
                            angle_range: 360
                            rotation: 270
                            ticks:
                              count: 13
                              length: 2
                              width: 0
                            indicators:
                              - line:
                                  id: hour_hand
                                  width: 6
                                  color: black
                                  r_mod: 0
                                  value: 0
                    - obj:
                          grid_cell_row_pos: 0
                          grid_cell_column_pos: 1
                          grid_cell_x_align: stretch
                          grid_cell_y_align: stretch
                          bg_opa: TRANSP
                          layout:
                            type: flex
                            flex_flow: ROW
                            flex_align_main: START
                            flex_align_cross: END
                            flex_align_track: START
                            pad_column: 5
                          widgets:
                            - label:
                                id: time_label
                                text_font: ep90
                                text_color: black
                                text: "12:00"
                    - label:
                        grid_cell_row_pos: 1
                        grid_cell_column_pos: 1
                        id: date_label
                        text_font: ep32
                        text_color: black
                        text: "September 19"


# Consumption box
        - obj:
            grid_cell_row_pos: 1
            grid_cell_column_pos: 0
            grid_cell_x_align: stretch
            grid_cell_y_align: stretch
            pad_all: 5
            widgets:
              - obj:
                  <<: *shadow_box_obj_base
                  widgets:
                    - image:
                        grid_cell_row_pos: 0
                        grid_cell_column_pos: 0
                        src: house_icon_60
                    - obj:
                          grid_cell_row_pos: 0
                          grid_cell_column_pos: 1
                          grid_cell_x_align: stretch
                          grid_cell_y_align: stretch
                          bg_opa: TRANSP
                          layout:
                            type: flex
                            flex_flow: ROW
                            flex_align_main: START
                            flex_align_cross: END
                            flex_align_track: START
                            pad_column: 5
                          widgets:
                            - label:
                                id: current_power_consumption_watts
                                text_font: ep70
                                text_color: black
                                text: "0000"
                            - label:
                                id: current_power_consumption_units
                                text_font: ep32
                                text_color: black
                                text: W
                                pad_bottom: 15
                    - label:
                        grid_cell_row_pos: 1
                        grid_cell_column_pos: 1
                        text_font: ep32
                        text_color: black
                        text: Consumption

# Production box
        - obj:
            grid_cell_row_pos: 2
            grid_cell_column_pos: 0
            grid_cell_x_align: stretch
            grid_cell_y_align: stretch
            pad_all: 5
            widgets:
              - obj:
                  <<: *shadow_box_obj_base
                  widgets:
                    - image:
                        grid_cell_row_pos: 0
                        grid_cell_column_pos: 0
                        src: produced_icon_60
                    - obj:
                          grid_cell_row_pos: 0
                          grid_cell_column_pos: 1
                          grid_cell_x_align: stretch
                          grid_cell_y_align: stretch
                          bg_opa: TRANSP
                          layout:
                            type: flex
                            flex_flow: ROW
                            flex_align_main: START
                            flex_align_cross: END
                            flex_align_track: START
                            pad_column: 5
                          widgets:
                            - label:
                                id: current_power_production_watts
                                text_font: ep70
                                text_color: black
                                text: "0000"
                            - label:
                                id: current_power_production_units
                                text_font: ep32
                                text_color: black
                                text: W
                                pad_bottom: 15
                    - label:
                        grid_cell_row_pos: 1
                        grid_cell_column_pos: 1
                        text_font: ep32
                        text_color: black
                        text: Production

# Info bar + Enphase app - spans 2 columns x 2 rows in upper right
        - obj:
            grid_cell_row_pos: 0
            grid_cell_column_pos: 1
            grid_cell_row_span: 2
            grid_cell_column_span: 2
            grid_cell_x_align: stretch
            grid_cell_y_align: stretch
            scrollable: false
            layout:
              type: flex
              flex_flow: COLUMN
              flex_align_main: START
              flex_align_cross: stretch
              pad_row: 5
            widgets:
# Info bar
              - obj:
                  height: 50px
                  pad_left: 4
                  layout:
                    type: flex
                    flex_flow: ROW
                    flex_align_main: SPACE_BETWEEN
                    flex_align_cross: CENTER
                    flex_align_track: CENTER
                    pad_column: 5
                    pad_row: 5
                  widgets:
                    - obj:
                        width: 110
                        height: 45
                        layout:
                          type: FLEX
                          flex_flow: COLUMN_WRAP
                          flex_align_cross: start
                          flex_align_track: center
                          pad_column: 3
                          pad_row: 1
                        widgets:
                          - image:
                              id: battery_soc_image
                              src: battery_100_45
                          - label:
                              id: battery_soc_percentage
                              text_font: ep24
                              text_color: black
                              text: ??%
                          - label:
                              text_font: ep16
                              text_color: black
                              text: Charge

                    - obj:
                        width: 250
                        height: 45
                        layout:
                          type: flex
                          flex_flow: ROW
                          flex_align_main: CENTER
                          flex_align_cross: CENTER
                          flex_align_track: CENTER
                          pad_column: 5
                          pad_row: 5
                        widgets:
                          - image:
                              id: grid_status_icon
                              src: grid_ok_45
                          - label:
                              id: grid_status_label
                              text_font: ep24
                              text_color: black
                              text: Grid unknown
                    - obj:
                        width: 110
                        height: 45
                        layout:
                          type: flex
                          flex_flow: ROW
                          flex_align_main: CENTER
                          flex_align_cross: CENTER
                          flex_align_track: CENTER
                          pad_column: 5
                          pad_row: 5
                        widgets:
                          - image:
                              id: weather_condition_icon
                              src: unknown_45
                          - label:
                              id: weather_temperature_today
                              text_font: ep32
                              text_color: black
                              text: "---°"

# Enphase app copy
              - obj:
                  flex_grow: 1
                  pad_left: 4
                  scrollable: false
                  layout:
                    type: grid
                    grid_rows: [ fr(1), fr(1) , fr(1) ]
                    grid_columns: [ content, FR(1), content, content, content, content, FR(1) ]
                    pad_column: 1
                    pad_row: 5
                  widgets:
              # Imported
                    - image:
                        grid_cell_y_align: center
                        src: grid_icon_45
                    - obj:
                        grid_cell_row_pos: 0
                        grid_cell_column_pos: 1
                        grid_cell_x_align: stretch
                        grid_cell_y_align: center
                        layout:
                          type: FLEX
                          flex_flow: ROW_WRAP
                          flex_align_cross: end
                          flex_align_track: center
                          pad_column: 3
                          pad_row: 1
                        widgets:
                          - label:
                              id: daily_energy_imported_watts
                              text_font: ep40
                              text_color: black
                              text: "00.0"
                          - label:
                              id: daily_energy_imported_watts_units
                              text_font: ep24
                              text_color: black
                              text: kWh
                              pad_bottom: 2
                          - label:
                              text_font: ep24
                              text_color: black
                              text: Imported
                  # Consumed
                    - image:
                        grid_cell_row_pos: 0
                        grid_cell_column_pos: 2
                        grid_cell_y_align: center
                        pad_left: 2
                        pad_right: 5
                        src: arrow_right_gray
                    - obj:
                        grid_cell_row_pos: 0
                        grid_cell_column_pos: 3
                        grid_cell_row_span: 3
                        grid_cell_y_align: center
                        width: 200
                        height: 200
                        radius: 100
                        border_width: 7
                        border_color: gray
                        layout:
                          type: FLEX
                          flex_flow: ROW_WRAP
                          pad_column: 3
                          pad_row: 1
                          flex_align_main: center
                          flex_align_cross: end
                          flex_align_track: center
                        widgets:
                          - image:
                              pad_left: 60
                              pad_right: 60
                              pad_bottom: 10
                              src: house_icon_45
                          - label:
                              id: daily_energy_consumption_watts
                              text_color: ep_orange
                              text_font: ep40
                              text: "00.0"
                          - label:
                              id: daily_energy_consumption_watts_unit
                              text_color: ep_orange
                              text_font: ep24
                              text: kWh
                              pad_bottom: 2
                          - label:
                              text_font: ep24
                              text_color: black
                              text: Consumed
                  # Exported
                    - image:
                          grid_cell_row_pos: 0
                          grid_cell_column_pos: 4
                          grid_cell_y_align: center
                          pad_right: 2
                          src: arrow_right_gray
                    - image:
                          grid_cell_row_pos: 0
                          grid_cell_column_pos: 5
                          grid_cell_y_align: center
                          src: grid_icon_45
                    - obj:
                          grid_cell_row_pos: 0
                          grid_cell_column_pos: 6
                          grid_cell_x_align: stretch
                          grid_cell_y_align: center
                          layout:
                              type: FLEX
                              flex_flow: ROW_WRAP
                              flex_align_cross: end
                              flex_align_track: center
                              pad_column: 3px
                              pad_row: 1px
                          widgets:
                            - label:
                                id: daily_energy_exported_watts
                                text_font: ep40
                                text_color: black
                                text: "00.0"
                            - label:
                                id: daily_energy_exported_watts_unit
                                text_font: ep24
                                text_color: black
                                text: kWh
                                pad_bottom: 2
                            - label:
                                text_font: ep24
                                text_color: black
                                text: Exported
               # Produced
                    - image:
                        grid_cell_row_pos: 1
                        grid_cell_column_pos: 0
                        grid_cell_y_align: center
                        src: produced_icon_45
                    - obj:
                        grid_cell_row_pos: 1
                        grid_cell_column_pos: 1
                        grid_cell_x_align: stretch
                        grid_cell_y_align: center
                        layout:
                          type: FLEX
                          flex_flow: ROW_WRAP
                          flex_align_cross: end
                          flex_align_track: center
                          pad_column: 3
                          pad_row: 1
                        widgets:
                          - label:
                              id: daily_energy_production_watts
                              text_font: ep40
                              text_color: ep_blue
                              text: "00.0"
                          - label:
                              id: daily_energy_production_watts_label
                              text_font: ep24
                              text_color: ep_blue
                              text: kWh
                              pad_bottom: 2
                          - label:
                              text_font: ep24
                              text_color: black
                              text: Produced
                    - image:
                        grid_cell_row_pos: 1
                        grid_cell_column_pos: 2
                        grid_cell_y_align: center
                        pad_right: 2
                        src: arrow_right_blue

               # Net Imported

                    - image:
                          id: daily_energy_net_watts_icon
                          grid_cell_row_pos: 1
                          grid_cell_column_pos: 5
                          grid_cell_y_align: center
                          pad_right: 2
                          src: up_arrow_45

                    - obj:
                          grid_cell_row_pos: 1
                          grid_cell_column_pos: 6
                          grid_cell_x_align: stretch
                          grid_cell_y_align: center
                          layout:
                              type: FLEX
                              flex_flow: ROW_WRAP
                              flex_align_cross: end
                              flex_align_track: center
                              pad_column: 3
                              pad_row: 1
                          widgets:
                            - label:
                                id: daily_energy_net_watts
                                text_font: ep40
                                text_color: black
                                text: "00.0"
                            - label:
                                id: daily_energy_net_watts_units
                                text_font: ep24
                                text_color: black
                                text: kWh
                                pad_bottom: 2
                            - label:
                                text_font: ep24
                                text_color: black
                                text: Net Imported

               # Discharged
                    - image:
                        grid_cell_row_pos: 2
                        grid_cell_column_pos: 0
                        grid_cell_y_align: center
                        pad_right: 2
                        src: battery_45
                    - obj:
                        grid_cell_row_pos: 2
                        grid_cell_column_pos: 1
                        grid_cell_x_align: stretch
                        grid_cell_y_align: center
                        layout:
                          type: FLEX
                          flex_flow: ROW_WRAP
                          flex_align_cross: end
                          flex_align_track: center
                          pad_column: 3
                          pad_row: 1
                        widgets:
                          - label:
                              id: daily_battery_energy_discharged_watts
                              text_font: ep40
                              text_color: ep_green
                              text: "00.0"
                          - label:
                              id: daily_battery_energy_discharged_watts_units
                              text_font: ep24
                              text_color: ep_green
                              text: kWh
                              pad_bottom: 2
                          - label:
                              text_font: ep24
                              text_color: black
                              text: Discharged
                    - image:
                        grid_cell_row_pos: 2
                        grid_cell_column_pos: 2
                        grid_cell_y_align: center
                        pad_right: 2
                        src: arrow_right_green

               # charged
                    - image:
                        grid_cell_row_pos: 2
                        grid_cell_column_pos: 4
                        grid_cell_y_align: center
                        pad_right: 2
                        src: arrow_right_green

                    - image:
                          grid_cell_row_pos: 2
                          grid_cell_column_pos: 5
                          grid_cell_y_align: center
                          pad_right: 2
                          src: battery_45

                    - obj:
                          grid_cell_row_pos: 2
                          grid_cell_column_pos: 6
                          grid_cell_x_align: stretch
                          grid_cell_y_align: center
                          layout:
                              type: FLEX
                              flex_flow: ROW_WRAP
                              flex_align_cross: end
                              flex_align_track: center
                              pad_column: 3
                              pad_row: 1
                          widgets:
                            - label:
                                id: daily_battery_energy_charged_watts
                                text_font: ep40
                                text_color: ep_green
                                text: "00.0"
                            - label:
                                id: daily_battery_energy_charged_watts_units
                                text_font: ep24
                                text_color: ep_green
                                text: kWh
                                pad_bottom: 2
                            - label:
                                text_font: ep24
                                text_color: black
                                text: Charged

#-------------------------------------------
# Graphics and Fonts
#-------------------------------------------
image:
  rgb565:
    alpha_channel:
      # clock icon not part of solar_icons package
      - file: esphome-modular-lvgl-buttons/assets/images/clock.svg
        id: clock_icon_60
        resize: 60x60
      - file: esphome-modular-lvgl-buttons/assets/images/solar/house.svg
        id: house_icon_60
        resize: 60x60
      - file: esphome-modular-lvgl-buttons/assets/images/solar/produced_icon.svg
        id: produced_icon_60
        resize: 60x60
      # Arrow images for the Enphase-style energy flow diagram
      - file: esphome-modular-lvgl-buttons/assets/images/solar/arrow_right_gray.svg
        id: arrow_right_gray
        resize: 25x15

      - file: esphome-modular-lvgl-buttons/assets/images/solar/arrow_right_green.svg
        id: arrow_right_green
